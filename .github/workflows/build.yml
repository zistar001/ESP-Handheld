# ESP-Handheld CI
# ===============
# Builds the firmware on every push and PR.
# Uses the official Espressif ESP-IDF action.

name: Build

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - '.gitignore'
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: ESP-IDF Build
        uses: espressif/action-setup-esp-idf@v2
        with:
          esp_idf_version: v5.5.4
          target: esp32s3

      - name: Build firmware
        run: |
          . $IDF_PATH/export.sh
          cd ${{ github.workspace }}
          idf.py set-target esp32s3
          idf.py build
        env:
          IDF_COMPONENT_MANAGER: '0'

      - name: Archive firmware
        uses: actions/upload-artifact@v4
        with:
          name: esp-handheld-firmware
          path: |
            build/esp_handheld.bin
            build/bootloader/bootloader.bin
            build/partition_table/partition-table.bin
            build/ota_data_initial.bin
            build/esp_handheld.elf
          retention-days: 7

  build-with-weather:
    # Optional: also build with weather (zlib) enabled
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: ESP-IDF Build
        uses: espressif/action-setup-esp-idf@v2
        with:
          esp_idf_version: v5.5.4
          target: esp32s3

      - name: Build firmware (with component manager)
        run: |
          . $IDF_PATH/export.sh
          cd ${{ github.workspace }}
          idf.py set-target esp32s3
          idf.py build
        env:
          IDF_COMPONENT_MANAGER: '1'

      - name: Archive firmware
        uses: actions/upload-artifact@v4
        with:
          name: esp-handheld-firmware-full
          path: |
            build/esp_handheld.bin
            build/bootloader/bootloader.bin
            build/partition_table/partition-table.bin
            build/ota_data_initial.bin
          retention-days: 7
