version: 1.0.0
# Peripherals Configuration for Zistar ESP-Handheld
peripherals:

  # I2C bus — LSM6DS3 IMU + AHT20 temp/humidity (SCL=GPIO2, SDA=GPIO1)
  - name: i2c_master
    type: i2c
    role: master
    config:
      port: 0
      pins:
        sda: 1
        scl: 2

  # MAX98357 speaker amplifier (I2S STD TX on I2S1, no MCLK needed)
  - name: i2s_audio_out
    type: i2s
    role: master
    format: std-out
    config:
      port: 1
      sample_rate_hz: 16000
      mclk_multiple: 256
      data_bit_width: 16
      slot_bit_width: I2S_SLOT_BIT_WIDTH_AUTO
      slot_mode: I2S_SLOT_MODE_STEREO
      slot_mask: I2S_STD_SLOT_BOTH
      ws_width: 16
      pins:
        mclk: -1
        bclk: 46
        ws: 9
        dout: 3
        din: -1

  # MSM261 digital microphone (I2S STD RX on I2S0)
  - name: i2s_audio_in
    type: i2s
    role: master
    format: std-in
    config:
      port: 0
      sample_rate_hz: 16000
      mclk_multiple: 256
      data_bit_width: 16
      slot_bit_width: I2S_SLOT_BIT_WIDTH_AUTO
      slot_mode: I2S_SLOT_MODE_MONO
      slot_mask: I2S_STD_SLOT_LEFT
      ws_width: 16
      pins:
        mclk: -1
        bclk: 11
        ws: 12
        dout: -1
        din: 10

  # SPI bus for ST7789 display (SPI2_HOST)
  - name: spi_display
    type: spi
    role: master
    config:
      spi_bus_config:
        spi_port: SPI2_HOST
        mosi_io_num: 14
        miso_io_num: -1
        sclk_io_num: 21
        max_transfer_sz: 134400    # 240 * 280 * 2

  # LCD backlight on GPIO43 (PWM)
  - name: ledc_backlight
    type: ledc
    role: none
    config:
      gpio_num: 43
      freq_hz: 5000
      duty: 1023
      duty_resolution: LEDC_TIMER_10_BIT
      output_invert: false
