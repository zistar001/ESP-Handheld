version: 1.0.0
# Devices Configuration for Zistar ESP-Handheld
devices:

  # MAX98357 I2S Class-D amp (I2S1 STD TX, no I2C control)
  - name: audio_dac
    chip: internal
    type: audio_codec
    version: default
    config:
      adc_enabled: false
      dac_enabled: true
      dac_max_channel: 2
      dac_channel_mask: "11"
      dac_init_gain: 0
      mclk_enabled: false
    peripherals:
      - name: i2s_audio_out

  # MSM261 digital microphone (I2S0 STD RX)
  - name: audio_adc
    chip: internal
    type: audio_codec
    version: default
    config:
      adc_enabled: true
      dac_enabled: false
      adc_max_channel: 1
      adc_channel_mask: "1"
      adc_init_gain: 0
      mclk_enabled: false
    peripherals:
      - name: i2s_audio_in

  # On-board ST7789 LCD (240x280, with 0/20 panel offset for visible area)
  - name: display_lcd
    chip: st7789
    type: display_lcd
    sub_type: spi
    version: default
    config:
      mirror_x: false
      mirror_y: false
      swap_xy: false
      invert_color: true
      x_max: 240
      y_max: 280
      io_spi_config:
        cs_gpio_num: 42
        dc_gpio_num: 44
        spi_mode: 3
        pclk_hz: 60000000
      lcd_panel_config:
        reset_gpio_num: 13
        rgb_ele_order: LCD_RGB_ELEMENT_ORDER_RGB
        bits_per_pixel: 16
        data_endian: LCD_RGB_DATA_ENDIAN_BIG
        vendor_config: NULL
    peripherals:
      - name: spi_display

  # LCD backlight brightness control (PWM via LEDC)
  - name: lcd_brightness
    type: ledc_ctrl
    version: default
    peripherals:
      - name: ledc_backlight

  # Physical buttons — ESP-Claw default doesn't navigate by buttons,
  # but these are documented for hardware reference and Lua GPIO access.
  # START+B combo (GPIO6+GPIO5) enables return to ESP-Handheld (see patch).
  - name: buttons
    chip: gpio_button
    type: custom
    version: 1.0.0
    init_skip: true
    config:
      button_up_gpio: 16
      button_down_gpio: 15
      button_left_gpio: 17
      button_right_gpio: 7
      button_a_gpio: 4
      button_b_gpio: 5
      button_start_gpio: 6
      active_level: 0
